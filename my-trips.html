<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>My Trips - Travelies</title>

    <link rel="stylesheet" href="css/travel-ui.css" />
    <link rel="stylesheet" href="css/mobile.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <style>
      body {
        background: linear-gradient(to bottom, #faf8f5, #f5ede3);
      }

      /* Page */

.page-title{
    text-align:center;
    color:#5C4033;
    font-size:2.3rem;
}
.page-subtitle{
    text-align:center;
    color:#777;
    font-size:1.2rem;
    margin-bottom:60px;
}
      /* Trips */

      .trips-grid {
        width: 90%;
        margin: auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
        padding-bottom: 60px;
      }

      .trip-card {
        width: 320px;
        background: white;
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        transition: 0.3s;
      }

      .trip-card:hover {
        transform: translateY(-8px);
      }

      .trip-card img {
        width: 100%;
        height: 230px;
        object-fit: cover;
      }

      .trip-content {
        padding: 20px;
        text-align: center;
      }

      .trip-content h3 {
        color: #5c4033;
        margin-bottom: 10px;
      }

      .trip-content p {
        color: #777;
      }

      .mytrips-btn i{
    color:white;
    margin-right:5px;
}

      .home-btn,
      .wishlist-btn {
        text-decoration: none;
        padding: 12px 22px;
        border-radius: 30px;
        color: white;
        font-weight: 600;
      }

      .home-btn {
        background: #5c4033;
        color: white;
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 30px;
      }

      .mytrips-btn {
        background: #d6b38a;
        color: white;
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 30px;
        font-weight: 600;
        transition: 0.3s;
      }

      .mytrips-btn:hover {
        background: #5c4033;
        transform: translateY(-3px);
      }

      .wishlist-btn {
        background: #d6b38a;
      }

      .cancel-btn {
        border: none;
        background: #5c4033;
        color: white;
        padding: 12px 22px;
        border-radius: 30px;
        cursor: pointer;
        margin-top: 10px;
      }

      .cancel-btn:hover {
        background: #d6b38a;
      }

      /* Empty State */

      .empty {
        text-align: center;
        margin-top: 80px;
      }

      .empty h2 {
        color: #5c4033;
      }

      .empty p {
        color: #777;
        margin-bottom: 25px;
      }

      .explore-btn {
        text-decoration: none;
        background: #d6b38a;
        color: white;
        padding: 14px 28px;
        border-radius: 30px;
        font-weight: 600;
      }

      .explore-btn:hover {
        background: #5c4033;
      }
    </style>
  </head>

  <body>
    <!-- SAME NAVBAR AS HOME -->
    <nav class="navbar">
      <div class="nav-logo">
        <h2>
          <i class="fas fa-plane"></i>
          Travelies
        </h2>
      </div>

      <div class="nav-actions">
        <a href="index.html" class="home-btn">
          <i class="fas fa-home"></i>
          Home
        </a>

        <a href="favorites.html" class="mytrips-btn">
<i class="fas fa-heart"></i>
Wishlist (<span id="wishlist-count">0</span>)
        </a>
      </div>
    </nav>
    
<h1 class="page-title">Travelies Trips</h1>

<p class="page-subtitle">
Discover, manage and revisit your travel experiences.
</p>
    <div id="trips-container" class="trips-grid"></div>
<script>
function updateWishlistCount() {
    const wishlist =
    JSON.parse(localStorage.getItem("wishlist")) || [];

    document.getElementById("wishlist-count").textContent =
    wishlist.length;
}

function loadTrips() {

    const container =
    document.getElementById("trips-container");

    const trips =
    JSON.parse(localStorage.getItem("bookedTrips")) || [];

    if(trips.length === 0){

        container.innerHTML = `

        <div class="empty">

            <h2>🧳 No Trips Booked Yet</h2>

            <p>
                Start exploring destinations and book your dream vacation.
            </p>

            <a href="home.html#packages"
            class="explore-btn">
                Explore Packages
            </a>

        </div>

        `;

        return;
    }

    container.innerHTML = "";

    trips.forEach((trip,index)=>{

        container.innerHTML += `

        <div class="trip-card">

            <img src="${trip.image || 'images/goa.jpg'}"
            alt="${trip.destination}">

            <div class="trip-content">

                <h3>${trip.destination}</h3>

                <p>
                    Your booking request has been submitted successfully.
                </p>

                <button
                class="cancel-btn"
                onclick="cancelTrip(${index})">
                    Cancel Trip
                </button>

            </div>

        </div>

        `;
    });
}

function cancelTrip(index){

    let trips =
    JSON.parse(localStorage.getItem("bookedTrips")) || [];

    trips.splice(index,1);

    localStorage.setItem(
        "bookedTrips",
        JSON.stringify(trips)
    );

    loadTrips();
}

updateWishlistCount();
loadTrips();
</script>
  </body>
</html>
